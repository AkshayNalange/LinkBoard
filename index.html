<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkBoard — Reference & Training Hub</title>
  <meta name="description" content="Curated reference, reading, and training material links." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">Link<span>Board</span></span>
        <span class="logo-sub">// Reference Hub</span>
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-btn active">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Browse
        </a>
        <a href="admin.html" class="nav-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Admin
        </a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <p class="hero-eyebrow">// curated knowledge base</p>
    <h1 class="hero-title">Your <em>Reference</em><br>& Training Hub</h1>
    <p class="hero-desc">Explore curated links across categories — documentation, tutorials, articles, and more.</p>
    <div class="hero-stats">
      <div class="stat">
        <div class="stat-num" id="stat-posts">—</div>
        <div class="stat-label">Posts</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-cats">—</div>
        <div class="stat-label">Categories</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-tags">—</div>
        <div class="stat-label">Tags</div>
      </div>
    </div>
  </section>

  <!-- FILTERS -->
  <div class="filter-section">
    <p class="filter-label">// filter by category or tag</p>
    <div class="search-box">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" class="search-input" id="searchInput" placeholder="Search titles, descriptions, tags…" />
    </div>
    <div class="filter-tags" id="filterTags">
      <button class="filter-tag active" data-filter="all">All</button>
    </div>
  </div>

  <!-- POSTS GRID -->
  <main class="posts-section">
    <div class="posts-grid" id="postsGrid">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <span style="color:var(--muted);font-size:0.85rem">Loading posts…</span>
      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon">●</span>
    <span id="toastMsg"></span>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
