<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mind Store</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="icon/master_icon.png" alt="Knowledge Hub" class="logo-icon-img" style="width:38px;height:38px;object-fit:contain;border-radius:6px;"/>
        <div class="logo-text">
          <div class="logo-name">Mind<span> Store</span></div>
        </div>
      </a>
      <div class="header-right">
        <a href="admin.html" class="hbtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Admin
        </a>
      </div>
    </div>
  </header>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topstats">
      <div class="tstat">
        <div class="tstat-dot"></div>
        <span class="tstat-v" id="sPosts">—</span>
        <span class="tstat-l">posts</span>
      </div>
      <div class="tstat">
        <div class="tstat-dot"></div>
        <span class="tstat-v" id="sCats">—</span>
        <span class="tstat-l">categories</span>
      </div>
      <div class="tstat">
        <div class="tstat-dot"></div>
        <span class="tstat-v" id="sTags">—</span>
        <span class="tstat-l">tags</span>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search posts, tags, categories…"/>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filterbar-wrap">
    <button class="fscroll-btn fscroll-left" id="fScrollLeft" aria-label="Scroll left">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="filterbar" id="filterBar">
      <button class="ftag on" data-f="all">All</button>
    </div>
    <button class="fscroll-btn fscroll-right" id="fScrollRight" aria-label="Scroll right">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- GRID -->
  <div class="grid-wrap">
    <div class="posts-grid" id="postsGrid">
      <div class="loader">
        <div class="ld"></div><div class="ld"></div><div class="ld"></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">
  <span class="ti" id="toastIcon">●</span>
  <span id="toastMsg"></span>
</div>

<script src="js/main.js"></script>
<script>
/* ── Filter Bar Scroll Buttons ─────────────────────── */
(function () {
  const bar  = document.getElementById('filterBar');
  const btnL = document.getElementById('fScrollLeft');
  const btnR = document.getElementById('fScrollRight');
  if (!bar || !btnL || !btnR) return;

  const STEP = 220;

  function update() {
    const hasOverflow = bar.scrollWidth > bar.clientWidth + 8;
    if (!hasOverflow) {
      btnL.classList.add('fscroll-hidden');
      btnR.classList.add('fscroll-hidden');
      return;
    }
    btnL.classList.toggle('fscroll-hidden', bar.scrollLeft <= 4);
    btnR.classList.toggle('fscroll-hidden',
      bar.scrollLeft >= bar.scrollWidth - bar.clientWidth - 4);
  }

  btnL.addEventListener('click', () => bar.scrollBy({ left: -STEP, behavior: 'smooth' }));
  btnR.addEventListener('click', () => bar.scrollBy({ left:  STEP, behavior: 'smooth' }));
  bar.addEventListener('scroll', update, { passive: true });

  /* Re-check whenever filterbar width or children change */
  new ResizeObserver(update).observe(bar);
  /* Also watch for dynamic tag injection by main.js */
  new MutationObserver(update).observe(bar, { childList: true });

  update(); /* initial state */
})();
</script>
</body>
</html>
