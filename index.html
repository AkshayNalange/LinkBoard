<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Knowledge Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="icon/master_icon.png" alt="Knowledge Hub" class="logo-icon-img" style="width:38px;height:38px;object-fit:contain;border-radius:6px;"/>
        <div class="logo-text">
          <div class="logo-name">Knowledge<span> Hub</span></div>
         
        </div>
      </a>
      <div class="header-right">
        <a href="admin.html" class="hbtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Admin
        </a>
      </div>
    </div>
  </header>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topstats">
      <div class="tstat">
        <div class="tstat-dot"></div>
        <span class="tstat-v" id="sPosts">—</span>
        <span class="tstat-l">posts</span>
      </div>
      <div class="tstat">
        <div class="tstat-dot"></div>
        <span class="tstat-v" id="sCats">—</span>
        <span class="tstat-l">categories</span>
      </div>
      <div class="tstat">
        <div class="tstat-dot"></div>
        <span class="tstat-v" id="sTags">—</span>
        <span class="tstat-l">tags</span>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search posts, tags, categories…"/>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filterbar" id="filterBar">
    <button class="ftag on" data-f="all">All</button>
  </div>

  <!-- GRID -->
  <div class="grid-wrap">
    <div class="posts-grid" id="postsGrid">
      <div class="loader">
        <div class="ld"></div><div class="ld"></div><div class="ld"></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">
  <span class="ti" id="toastIcon">●</span>
  <span id="toastMsg"></span>
</div>

<script src="js/main.js"></script>
</body>
</html>
