<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin — LinkBoard</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="mesh">
  <div class="mesh-grid"></div>
  <div class="mesh-orb"></div>
</div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-badge">🔑</div>
    <h2 class="login-title">Admin Access</h2>
    <p class="login-sub">Enter your password to continue</p>
    <input class="login-field" id="loginInput" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="login-btn" id="loginBtn">Enter Dashboard</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<div class="wrap" id="adminWrap" style="display:none">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">LB</div>
        <div>
          <div class="logo-name">Link<span>Board</span></div>
          <div class="logo-tag">// admin panel</div>
        </div>
      </a>
      <div class="header-right">
        <a href="index.html" class="hbtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          View Site
        </a>
        <button class="hbtn" id="logoutBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
  </header>

  <!-- ADMIN SHELL -->
  <div class="admin-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sb-section">
        <p class="sb-lbl">Overview</p>
        <div class="sb-stat">
          <div class="sb-icon a">📄</div>
          <div>
            <div class="sb-val" id="sbPosts">—</div>
            <div class="sb-lbl2">Total Posts</div>
          </div>
        </div>
        <div class="sb-stat">
          <div class="sb-icon b">🏷️</div>
          <div>
            <div class="sb-val" id="sbCats">—</div>
            <div class="sb-lbl2">Categories</div>
          </div>
        </div>
        <div class="sb-stat">
          <div class="sb-icon c">⚡</div>
          <div>
            <div class="sb-val" id="sbTags">—</div>
            <div class="sb-lbl2">Unique Tags</div>
          </div>
        </div>
      </div>

      <div class="sb-section">
        <p class="sb-lbl">Filter by Category</p>
        <div class="sb-cats" id="sbCatList"></div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">

      <!-- CREATE FORM -->
      <div class="form-card">
        <div class="form-head">
          <div class="fh-icon">✦</div>
          <div class="fh-title">New Post</div>
        </div>
        <div class="form-grid">
          <div class="fg full">
            <label class="fg-label">Title <span class="req">*</span></label>
            <input class="fg-input" id="fTitle" type="text" placeholder="Post title…"/>
          </div>
          <div class="fg full">
            <label class="fg-label">Description</label>
            <textarea class="fg-ta" id="fDesc" placeholder="Brief description…" rows="3"></textarea>
          </div>
          <div class="fg full">
            <label class="fg-label">URL <span class="req">*</span></label>
            <input class="fg-input" id="fUrl" type="url" placeholder="https://…"/>
          </div>
          <div class="fg">
            <label class="fg-label">Category <span class="req">*</span></label>
            <input class="fg-input" id="fCat" type="text" placeholder="e.g. Tutorial, Docs…" list="catList"/>
            <datalist id="catList"></datalist>
          </div>
          <div class="fg">
            <label class="fg-label">Tags</label>
            <div class="tags-field" id="tagsField">
              <input class="tags-bare" id="tagsInput" type="text" placeholder="Type + Enter…"/>
            </div>
            <p class="fg-hint">Enter or comma to add a tag</p>
          </div>
        </div>
        <button class="btn-pub" id="submitBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Publish Post
        </button>
      </div>

      <!-- POSTS LIST -->
      <div>
        <div class="pts-head">
          <span class="pts-title">Published Posts</span>
          <span class="pts-badge" id="ptsCount">0 posts</span>
        </div>
        <div class="plist" id="plist">
          <div class="loader" style="grid-column:unset">
            <div class="ld"></div><div class="ld"></div><div class="ld"></div>
          </div>
        </div>
      </div>

    </main>
  </div><!-- /admin-shell -->

</div><!-- /wrap -->

<div class="toast" id="toast">
  <span class="ti" id="toastIcon">●</span>
  <span id="toastMsg"></span>
</div>

<script src="js/admin.js"></script>
</body>
</html>
