<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — LinkBoard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- LOGIN OVERLAY -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <h2 class="login-title">Admin Access</h2>
      <p class="login-sub">Enter your admin password to continue</p>
      <input
        type="password"
        class="login-input"
        id="loginInput"
        placeholder="••••••••"
        autocomplete="current-password"
      />
      <button class="login-btn" id="loginBtn">Authenticate</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">Link<span>Board</span></span>
        <span class="logo-sub">// Admin Panel</span>
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          View Public
        </a>
        <button class="nav-btn" id="logoutBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </nav>
    </div>
  </header>

  <!-- ADMIN LAYOUT -->
  <div class="admin-layout" id="adminContent" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <p class="sidebar-title">// dashboard</p>
      <div class="stat-card">
        <div class="stat-card-num" id="adminStatPosts">—</div>
        <div class="stat-card-label">Total Posts</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num" id="adminStatCats">—</div>
        <div class="stat-card-label">Categories</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num" id="adminStatTags">—</div>
        <div class="stat-card-label">Unique Tags</div>
      </div>

      <div style="margin-top:2rem">
        <p class="sidebar-title">// quick filters</p>
        <div id="adminFilterTags" style="display:flex;flex-direction:column;gap:0.4rem"></div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">

      <!-- CREATE FORM -->
      <div class="form-card">
        <h2 class="form-title"><span>+</span> New Post</h2>
        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label">Title <span class="req">*</span></label>
            <input type="text" class="form-input" id="fTitle" placeholder="e.g. Getting Started with React Hooks" />
          </div>
          <div class="form-group full">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" id="fDesc" placeholder="Brief description of this resource…" rows="3"></textarea>
          </div>
          <div class="form-group full">
            <label class="form-label">URL / Link <span class="req">*</span></label>
            <input type="url" class="form-input" id="fUrl" placeholder="https://..." />
          </div>
          <div class="form-group">
            <label class="form-label">Category <span class="req">*</span></label>
            <input type="text" class="form-input" id="fCategory" placeholder="e.g. Tutorial, Docs, Article…" list="categoryList" />
            <datalist id="categoryList"></datalist>
          </div>
          <div class="form-group">
            <label class="form-label">Tags</label>
            <div class="tags-input-wrap" id="tagsWrap">
              <input type="text" class="tags-real-input" id="tagsInput" placeholder="Type and press Enter…" />
            </div>
            <p class="tag-hint">Press Enter or comma to add a tag</p>
          </div>
        </div>
        <button class="btn-submit" id="submitBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Publish Post
        </button>
      </div>

      <!-- POSTS LIST -->
      <div>
        <h3 style="font-family:var(--font-display);font-size:1.25rem;margin-bottom:1.25rem;color:var(--muted)">
          Published Posts
          <span id="adminPostCount" style="font-family:var(--font-mono);font-size:0.75rem;color:var(--muted);margin-left:0.5rem"></span>
        </h3>
        <div class="admin-posts-list" id="adminPostsList">
          <div class="loading-wrap">
            <div class="spinner"></div>
            <span style="color:var(--muted);font-size:0.85rem">Loading…</span>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon">●</span>
    <span id="toastMsg"></span>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
