<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin — Knowledge Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ═══════ ART DECO LOGIN ═══════ -->
<div class="login-screen" id="loginScreen">
  <div class="login-rays"></div>
  <div class="login-geo g1"></div>
  <div class="login-geo g2"></div>
  <div class="login-geo g3"></div>
  <div class="login-geo g4"></div>

  <div class="login-box">
    <div class="login-header-bar">
      <div class="compass">
        <div class="compass-ring"></div>
        <div class="compass-inner"></div>
        <div class="compass-dot"></div>
      </div>
      <div class="login-hdr-title">Admin Access</div>
      <div class="login-hdr-sub">Knowledge Hub Control Panel</div>
    </div>
    <div class="login-form-area">
      <div class="login-field-wrap">
        <label class="login-field-label">Password</label>
        <input class="login-field" id="loginInput" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div class="login-divider">Secured Access</div>
      <button class="login-btn" id="loginBtn">Enter Dashboard →</button>
      <p class="login-err" id="loginErr"></p>
    </div>
  </div>
</div>

<!-- ═══════ ADMIN PANEL ═══════ -->
<div class="wrap" id="adminWrap" style="display:none">

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="icon/master_icon.png" alt="Knowledge Hub" class="logo-icon-img" style="width:38px;height:38px;object-fit:contain;border-radius:6px;"/>
        <div class="logo-text">
          <div class="logo-name">Knowledge<span> Hub</span></div>
          <div class="logo-sub">// Admin Panel</div>
        </div>
      </a>
      <div class="header-right">
        <a href="index.html" class="hbtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          View Site
        </a>
        <button class="hbtn primary" id="logoutBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
  </header>

  <div class="admin-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <!-- Mobile toggle -->
      <div class="sidebar-toggle" id="sidebarToggle">
        Dashboard Overview
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

      <div class="sidebar-content" id="sidebarContent">
        <div class="sb-section" style="margin-top:.85rem">
          <div class="sb-lbl">Overview</div>
          <div class="sb-stats-row">
            <div class="sb-stat">
              <div class="sb-icon a">📄</div>
              <div><div class="sb-val" id="sbPosts">—</div><div class="sb-lbl2">Posts</div></div>
            </div>
            <div class="sb-stat">
              <div class="sb-icon b">🏷</div>
              <div><div class="sb-val" id="sbCats">—</div><div class="sb-lbl2">Categories</div></div>
            </div>
            <div class="sb-stat">
              <div class="sb-icon c">⚡</div>
              <div><div class="sb-val" id="sbTags">—</div><div class="sb-lbl2">Tags</div></div>
            </div>
          </div>
        </div>

        <div class="sb-section">
          <div class="sb-lbl">Browse by Category</div>
          <div class="sb-cats" id="sbCatList">
            <p style="font-size:.74rem;color:var(--warm-gray2);padding:4px 2px">No posts yet</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">

      <!-- CREATE FORM -->
      <div class="form-card">
        <div class="form-card-header">
          <div class="fh-icon">✦</div>
          <div class="fh-title">Publish New Post</div>
          <span class="fh-sub">Posted as "Space Pirate"</span>
        </div>
        <div class="form-body">
          <div class="form-grid">

            <div class="fg full">
              <label class="fg-label">Title <span class="req">*</span></label>
              <input class="fg-input" id="fTitle" type="text" placeholder="Post title…" autocomplete="off"/>
            </div>

            <div class="fg full">
              <label class="fg-label">Description</label>
              <textarea class="fg-ta" id="fDesc" rows="3" placeholder="Brief description of this resource…"></textarea>
            </div>

            <div class="fg full">
              <label class="fg-label">URL / Link <span class="req">*</span></label>
              <input class="fg-input" id="fUrl" type="url" placeholder="https://…" autocomplete="off" inputmode="url"/>
            </div>

            <!-- Multi-select categories -->
            <div class="fg">
              <label class="fg-label">Categories <span class="req">*</span></label>
              <div class="multi-select-wrap" id="catWrap">
                <div class="multi-select-trigger" id="catTrigger">
                  <span class="ms-placeholder">Select categories…</span>
                  <svg class="ms-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="ms-dropdown" id="catDropdown"></div>
              </div>
            </div>

            <!-- Predefined 30 tags -->
            <div class="fg">
              <label class="fg-label">Tags <span style="color:var(--warm-gray2);font-weight:400;text-transform:none;letter-spacing:0">(check all that apply)</span></label>
              <div class="tags-grid-wrap">
                <div class="tags-grid" id="tagsGrid"></div>
              </div>
            </div>

          </div>

          <button class="btn-pub" id="submitBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Publish Post
          </button>
        </div>
      </div>

      <!-- FEED -->
      <div class="feed-head">
        <span class="feed-title">Published Posts</span>
        <span class="feed-badge" id="feedCount">0 posts</span>
      </div>
      <div class="feed" id="feed">
        <div class="loader" style="display:flex;padding:2rem 0">
          <div class="ld"></div><div class="ld"></div><div class="ld"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<div class="toast" id="toast">
  <span class="ti" id="toastIcon">●</span>
  <span id="toastMsg"></span>
</div>

<script src="js/admin.js"></script>
</body>
</html>
